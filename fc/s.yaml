edition: 3.0.0
name: mount-helicon
access: "${vars.access}"

vars:
  # Override on the CLI or in .env-style export before `s deploy`. See DEPLOY-FC.md.
  access: default                     # `s config add` profile name (holds AK/SK)
  region: ap-southeast-1              # Singapore — matches the Model Studio endpoint region
  namespace: helicon                  # your ACR namespace
  image: "registry.${vars.region}.aliyuncs.com/${vars.namespace}/helicon-fc:latest"

resources:
  helicon:
    component: fc3
    props:
      region: "${vars.region}"
      functionName: mount-helicon
      description: "Mount Helicon — read-only memory-eval dashboard + API (Qwen Cloud Hackathon)"
      runtime: custom-container
      # Web function: the container's HTTP server owns the port; FC forwards the
      # trigger to it. Must equal PORT in the Dockerfile / entrypoint.
      customContainerConfig:
        image: "${vars.image}"
        port: 9000
      cpu: 0.5
      memorySize: 1024                # 34MB DB in /tmp + FastAPI; 1GB is comfortable
      diskSize: 512                   # writable /tmp for the DB copy
      timeout: 60
      instanceConcurrency: 20
      # No environmentVariables: the hosted instance serves the seeded DEMO store,
      # whose exam + governance loop + guard are deterministic and run KEYLESS. Live
      # Qwen judging degrades gracefully (the battery says "no key"); Qwen is proven
      # on Model Studio separately (the live call in GOLDEN_SUBMISSION + qwen.py /
      # embeddings.py). This keeps the deploy free of any secret and any ${env.*}
      # resolution that older Serverless Devs versions choke on.
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
